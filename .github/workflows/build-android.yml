name: Build Android APK (Release)

on:
  push:
    tags:
      - 'v*' # Trigger only when a tag starting with 'v' is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allow manual triggering for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔐 Create .env
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "EXPO_PUBLIC_GEMINI_API_KEY=$GEMINI_API_KEY" >> .env

      - name: 🔑 Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CASHLENS_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/cashlens-upload.keystore

      - name: 🏗 Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PCASHLENS_UPLOAD_STORE_FILE=cashlens-upload.keystore \
            -PCASHLENS_UPLOAD_STORE_PASSWORD="$CASHLENS_UPLOAD_STORE_PASSWORD" \
            -PCASHLENS_UPLOAD_KEY_ALIAS="$CASHLENS_UPLOAD_KEY_ALIAS" \
            -PCASHLENS_UPLOAD_KEY_PASSWORD="$CASHLENS_UPLOAD_KEY_PASSWORD"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CASHLENS_UPLOAD_STORE_PASSWORD: ${{ secrets.CASHLENS_UPLOAD_STORE_PASSWORD }}
          CASHLENS_UPLOAD_KEY_ALIAS: ${{ secrets.CASHLENS_UPLOAD_KEY_ALIAS }}
          CASHLENS_UPLOAD_KEY_PASSWORD: ${{ secrets.CASHLENS_UPLOAD_KEY_PASSWORD }}

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref }}
          body: "Official release version ${{ github.ref_name }}. Built automatically by GitHub Actions."
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Upload APK for Manual Run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
